<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Image with Location Marker</title>
    <!-- 
        Image Files used (all in same directory):
        - 照片框.png (Photo Frame.png) - Blue ring frame
        - 照片框内圈.png (Photo Frame Inner Circle.png) - Inner circle
        - 线圈.png (Coil.png) or 线圈-1.png - Glowing ring effect
        - 底座.png (Base.png) - Location pin base
    -->
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #E6F3FF; /* Light blue background */
            font-family: Arial, sans-serif;
        }

        .map-container {
            position: relative;
            width: 400px;
            height: 400px;
            /* Light blue background with grid overlay */
            background: 
                repeating-linear-gradient(0deg, rgba(200, 200, 200, 0.1) 0px, transparent 20px),
                repeating-linear-gradient(90deg, rgba(200, 200, 200, 0.1) 0px, transparent 20px),
                #E6F3FF;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .map-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><circle cx="20" cy="20" r="2" fill="rgba(150,150,150,0.2)"/><circle cx="80" cy="40" r="2" fill="rgba(150,150,150,0.2)"/><circle cx="50" cy="70" r="2" fill="rgba(150,150,150,0.2)"/><circle cx="90" cy="80" r="2" fill="rgba(150,150,150,0.2)"/></svg>');
            opacity: 0.3;
        }

        .location-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .profile-image-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Glowing ring effect overlay - outermost layer */
        .glow-ring {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            background: url('线圈.png') center/cover;
            z-index: 0;
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
        }

        /* Outer blue ring frame */
        .profile-image-container::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: url('照片框.png') center/cover;
            z-index: 1;
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
        }

        /* Inner circle - white border effect */
        .profile-image-container::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: url('照片框内圈.png') center/cover;
            z-index: 2;
            pointer-events: none;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 3;
            border: 4px solid #fff;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.8;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .location-pin {
            width: 24px;
            height: 30px;
            background: url('底座.png') center/cover;
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            margin-top: 4px;
        }

        /* White dot in center of location pin */
        .location-pin::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            z-index: 1;
        }

        /* Alternative: If you want to use an actual image */
        .profile-image-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 4px solid #fff;
            box-shadow: 0 0 0 3px #4a90e2, 
                        0 0 20px rgba(74, 144, 226, 0.6),
                        0 0 40px rgba(74, 144, 226, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Example with a real image - uncomment and add your image URL */
        /*
        .profile-image {
            background-image: url('your-image-url.jpg');
            background-size: cover;
            background-position: center;
        }
        */
    </style>
</head>
<body>
    <div class="map-container">
        <div class="location-marker">
            <div class="profile-image-container">
                <!-- Glowing ring effect -->
                <div class="glow-ring"></div>
                <!-- Profile image with frame overlays -->
                <img src="https://avatars.githubusercontent.com/u/12636050" 
                     alt="Profile" 
                     class="profile-image">
            </div>
            <div class="location-pin"></div>
        </div>
    </div>
</body>
</html>
